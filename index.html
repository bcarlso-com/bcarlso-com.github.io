<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Centered Image</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f0f0; /* Optional background color */
    }
    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain; /* Ensures the image maintains its aspect ratio */
    }
  </style>
</head>
<body>
  <img src="./assets/background.png" alt="bcarlso.com">
</body>
</html>
