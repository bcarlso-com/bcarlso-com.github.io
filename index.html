  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #f0f0f0;
      font-family: 'Source Serif 4', Georgia, serif;
      color: #2c2c2c;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-family: 'Cabin Sketch', cursive;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 0.25rem;
      color: #1a1a1a;
    }

    .hero-image {
      margin: 1.5rem 0;
    }

    .hero-image img {
      max-width: 100%;
      height: auto;
    }

    .tagline {
      font-size: 1.125rem;
      font-style: italic;
      color: #555;
      margin-bottom: 2rem;
      letter-spacing: 0.03em;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }

    .social-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      color: #555;
      transition: color 0.2s ease;
    }

    .social-links a:hover {
      color: #1a1a1a;
    }

    .social-links svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }
  </style>
